<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Landing Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="header">
    <img id="header-img" src="https://cdn.freecodecamp.org/testable-projects-fcc/images/product-landing-page-logo.png" alt="Company Logo">
    
    <nav id="nav-bar">
      <a class="nav-link" href="#features">Features</a>
      <a class="nav-link" href="#how-it-works">How It Works</a>
      <a class="nav-link" href="#pricing">Pricing</a>
    </nav>
  </header>

  <main>
    <section id="hero">
      <h2>Handcrafted, home-made masterpieces</h2>
      
      <form id="form" action="https://www.freecodecamp.org/email-submit">
        <input id="email" type="email" name="email" placeholder="Enter your email address" required>
        <input id="submit" type="submit" value="Get Started">
      </form>
    </section>

    <section id="features">
      <h2>Premium Materials</h2>
      <p>Our instruments use only the highest quality brass available on the market.</p>
    </section>

    <section id="how-it-works">
      <h2>How It Works</h2>
      <iframe id="video" width="560" height="315" src="https://www.youtube.com/embed/y8Yv4pnO7qc" allowfullscreen></iframe>
    </section>

    <section id="pricing">
      <h2>Pricing</h2>
      <p>Tenor Trombone: $600</p>
      <p>Bass Trombone: $900</p>
      <p>Valve Trombone: $1200</p>
    </section>
  </main>
  
</body>
</html>
